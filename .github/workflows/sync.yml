name: Sync LeetCode

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install leetcode-cli
        run: |
          npm install -g leetcode-cli

      - name: Login to LeetCode
        run: |
          leetcode user -l https://leetcode.com \
          -c "${{ secrets.LEETCODE_SESSION }}" \
          -t "${{ secrets.CSRF_TOKEN }}"

      - name: Fetch submissions
        run: |
          mkdir -p solutions
          leetcode list > solutions/list.txt

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Sync LeetCode submissions" || echo "No changes"
          git push
