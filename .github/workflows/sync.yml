name: Update Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Update README stats
        run: |
          COUNT=$(find solutions -type f | wc -l)
          sed -i "s/Total Problems Solved: \*\*\*.*/Total Problems Solved: **$COUNT**/" README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update stats" || echo "No changes"
          git push
