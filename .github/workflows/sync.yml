name: Sync LeetCode

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Git auth
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Install leetcode-cli
        run: |
          npm install -g leetcode-cli

      - name: Login to LeetCode
        run: |
          leetcode user -l https://leetcode.com \
          -c "${{ secrets.LEETCODE_SESSION }}" \
          -t "${{ secrets.CSRF_TOKEN }}"

      - name: Fetch submissions
        run: |
          mkdir -p solutions
          leetcode list > solutions/list.txt

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Sync LeetCode submissions" || echo "No changes"
          git push
